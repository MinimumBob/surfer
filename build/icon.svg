  <path d="M 240 300 Q 260 285 280 300" fill="none" stroke="#c8dce8" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 150 370 Q 165 358 180 370" fill="none" stroke="#c8dce8" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <!-- Japanese character 波 (wave) subtle watermark -->
  <text x="512" y="880" font-family="serif" font-size="120" text-anchor="middle" fill="#c9a96e" opacity="0.18">波</text>
</svg>
